<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Witherwood</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
@keyframes rainfall {
  from {
    transform: translate3d(0, -120vh, 0) rotate(12deg);
  }
  to {
    transform: translate3d(-120px, 120vh, 0) rotate(12deg);
  }
}
.rain-overlay {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 2147483647;
}
.rain-drop {
  position: absolute;
  top: -20%; 
  width: 4.5px;
  border-radius: 9999px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0),
    rgba(220,238,255,0.95)
  );
  box-shadow: 0 0 7px rgba(180,220,255,0.4);
  animation: rainfall linear infinite;
  will-change: transform;
}

@keyframes shootingStar {
  0% {
    transform: translate3d(0, 0, 0) rotate(25deg);
    opacity: 0;
  }
  8% {
    opacity: 1;
  }
  65% {
    opacity: 1;
  }
  100% {
    transform: translate3d(320px, 180px, 0) rotate(25deg);
    opacity: 0;
  }
}

.shooting-star {
  position: absolute;
  width: 140px;
  height: 3px;
  border-radius: 9999px;
  /* Bright head leads the motion (right side), tail trails behind (left side). */
  background: linear-gradient(
    to right,
    rgba(255,255,255,0),
    rgba(255,255,255,0.08) 20%,
    rgba(255,255,255,0.35) 55%,
    rgba(255,255,255,0.95) 88%,
    rgba(255,255,255,1) 100%
  );
  box-shadow:
    0 0 6px rgba(255,255,255,0.45),
    0 0 14px rgba(255,255,255,0.65),
    0 0 24px rgba(196,181,253,0.35);
  animation: shootingStar 2.4s ease-out forwards;
}

.shooting-star::after {
  content: '';
  position: absolute;
  right: -1px;
  top: 50%;
  width: 6px;
  height: 6px;
  border-radius: 9999px;
  transform: translateY(-50%);
  background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0.95) 45%, rgba(255,255,255,0) 100%);
  box-shadow:
    0 0 8px rgba(255,255,255,0.9),
    0 0 18px rgba(255,255,255,0.7),
    0 0 30px rgba(196,181,253,0.45);
}

.brand-title {
  font-family: 'Cinzel', serif;
  letter-spacing: 0.06em;
  font-weight: 700;
  text-shadow:
    0 2px 8px rgba(16, 24, 40, 0.08),
    0 0 20px rgba(16, 185, 129, 0.08);
}

.brand-title-night {
  text-shadow:
    0 2px 10px rgba(0, 0, 0, 0.45),
    0 0 24px rgba(167, 139, 250, 0.22);
}

.brand-title-rain {
  text-shadow:
    0 2px 10px rgba(15, 23, 42, 0.12),
    0 0 24px rgba(14, 165, 233, 0.16);
}
</style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#f7f4ea">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
</head>
<body class="min-h-screen bg-gradient-to-b from-emerald-50 via-lime-50 to-teal-100 text-slate-800">
<div id="rainOverlay" class="rain-overlay hidden"></div>
<div id="nightOverlay" class="rain-overlay hidden"></div>

<div class="min-h-screen p-4 md:p-8 pb-10 md:pb-16">
  <div id="appRoot" class="min-h-[calc(100vh-2rem)] rounded-3xl bg-gradient-to-b from-emerald-50 via-lime-50 to-teal-100 p-6">
    <div class="w-full max-w-none space-y-6">
      <header class="flex items-start justify-between gap-4 w-full px-1 md:px-2">
        <div class="flex-1 min-w-0">
          <h1 id="brandTitle" class="brand-title text-4xl md:text-6xl">🌲 Witherwood</h1>
          <p class="text-slate-600 mt-2">Every 10 minutes of focus plants a tree.</p>
        </div>
        <button id="fullscreenBtn" class="px-4 py-3 rounded-2xl border bg-white/85 flex-shrink-0 self-start" title="Toggle Fullscreen" aria-label="Toggle Fullscreen">
          ⛶
        </button>
      </header>

      <nav id="nav" class="flex flex-wrap gap-2"></nav>

      <section id="focusPage" class="rounded-3xl bg-white/85 border shadow-lg p-6 max-w-3xl mx-auto mb-8 md:mb-12 lg:mb-16">
        <div class="max-w-lg mx-auto text-center">
          <div id="phaseLabel" class="text-sm uppercase tracking-wide text-emerald-700">Focus Session</div>

          <div class="mt-3 flex justify-center">
            <div class="relative w-64 h-64 md:w-72 md:h-72">
              <svg class="w-full h-full -rotate-90" viewBox="0 0 140 140">
                <circle cx="70" cy="70" r="60" fill="none" stroke="#d1fae5" stroke-width="8" />
                <circle
                  id="progressRing"
                  cx="70"
                  cy="70"
                  r="60"
                  fill="none"
                  stroke="#10b981"
                  stroke-width="8"
                  stroke-linecap="round"
                  stroke-dasharray="376.99"
                  stroke-dashoffset="0"
                />
              </svg>

              <div class="absolute inset-0 flex flex-col items-center justify-center">
                <div id="timer" class="text-6xl md:text-7xl font-mono font-bold">25:00</div>
                <div id="progressLabel" class="mt-2 text-sm text-slate-500"></div>
              </div>
            </div>
          </div>

          <div id="focusControls" class="mt-4 flex items-center justify-center gap-3">
            <label>Focus (min)</label>
            <input
              id="focusMinutesInput"
              type="number"
              min="1"
              max="180"
              value="25"
              class="w-24 rounded-xl border px-3 py-2"
            />
          </div>

          <div id="saplings" class="mt-4 text-lg font-medium"></div>

          <div class="flex flex-wrap justify-center gap-3 mt-4">
            <button id="startPauseBtn" class="px-5 py-3 rounded-2xl bg-emerald-500 text-white font-semibold">Start</button>
            <button id="witherBtn" class="px-5 py-3 rounded-2xl bg-amber-500 text-white font-semibold">🍂 Wither Tree</button>
            <button id="resetBtn" class="px-5 py-3 rounded-2xl border bg-white">Reset</button>
          </div>

          <p id="message" class="mt-5 italic text-slate-500">“A calm mind nurtures strong roots.”</p>
        </div>
      </section>

      <section id="forestPage" class="hidden rounded-3xl bg-white/85 border shadow-lg p-6">
        <h2 class="text-2xl font-semibold mb-2">Your Forest</h2>
        <div id="forestSummary" class="text-slate-500 mb-4"></div>
        <div id="forestGrid" class="flex flex-wrap gap-1 text-xl"></div>
      </section>

      <section id="dashboardPage" class="hidden">
        <div id="dashboardGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

      <section id="settingsPage" class="hidden rounded-3xl bg-white/85 border shadow-lg p-6 max-w-xl mx-auto space-y-4">
        <h2 class="text-2xl font-semibold">Settings</h2>

        <label class="flex items-center gap-3">
          <input id="breaksEnabledToggle" type="checkbox" />
          <span>Enable Break Sessions</span>
        </label>

        <label class="block">
          <span>Break Minutes</span>
          <input
            id="breakMinutesInput"
            type="number"
            min="1"
            max="60"
            value="5"
            class="w-full mt-2 rounded-xl border px-3 py-2"
          />
        </label>

        <label class="flex items-center gap-3">
          <input id="ambientSoundToggle" type="checkbox" />
          <span>Enable Ambient Sound</span>
        </label>

        <label class="block">
          <div class="flex items-center justify-between">
            <span>Ambient Volume</span>
            <span id="ambientVolumeLabel" class="text-sm text-slate-500">50%</span>
          </div>
          <input
            id="ambientVolumeInput"
            type="range"
            min="0"
            max="100"
            step="1"
            value="50"
            class="w-full mt-2"
          />
        </label>

        <label class="block">
          <span>Theme</span>
          <select id="themeSelect" class="w-full mt-2 rounded-xl border px-3 py-2">
            <option value="forest">🌲 Forest Theme</option>
            <option value="night">🌙 Night Theme</option>
            <option value="rain">🌧️ Rain Theme</option>
          </select>
        </label>

        <div class="pt-2 border-t border-slate-200/60 space-y-3">
          <h3 class="font-semibold">Reset Data</h3>
          <div>
            <button id="resetAllBtn" class="px-4 py-2 rounded-2xl bg-rose-500 text-white hover:bg-rose-600 transition">
              Reset All Data
            </button>
          </div>
          <p class="text-sm text-slate-500">Permanently clears your forest and all saved statistics.</p>
        </div>
      </section>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'witherwood-single-file-v3';
const DEFAULTS = {
  focusMinutes: 25,
  breakMinutes: 5,
  theme: 'forest',
  ambientSoundEnabled: false,
  ambientVolume: 50,
  livingTrees: 0,
  deadTrees: 0,
  totalFocusMinutes: 0,
  todayFocusMinutes: 0,
  streakDays: 0,
  bestDayMinutes: 0,
  lastFocusDate: '',
  breaksEnabled: true,
};

let data;
try {
  data = { ...DEFAULTS, ...(JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null') || {}) };
} catch {
  data = { ...DEFAULTS };
}

let page = 'focus';
let phase = 'focus';
let isRunning = false;
let intervalId = null;
let audioUnlocked = false;
let rainAudio = null;
let nightAudio = null;
let forestAudio = null;
let secondsLeft = data.focusMinutes * 60;
let healthyTrees = Math.max(1, Math.ceil(data.focusMinutes / 10));

const pages = ['focus', 'forest', 'dashboard', 'settings'];
const labels = {
  focus: '⏱ Focus',
  forest: '🌲 Forest',
  dashboard: '📊 Dashboard',
  settings: '⚙️ Settings',
};

const themes = {
  forest: ['from-emerald-50', 'via-lime-50', 'to-teal-100'],
  night: ['from-slate-950', 'via-slate-900', 'to-indigo-950'],
  rain: ['from-sky-100', 'via-slate-200', 'to-blue-300'],
};

function el(id) {
  return document.getElementById(id);
}

function getVolumeMultiplier() {
  // 50 = current baseline volume.
  // 100 = 4x louder than the original baseline.
  return Math.max(0, Math.min(4, (data.ambientVolume ?? 50) / 25));
}

function applyAudioVolumes() {
  const volume = getVolumeMultiplier();

  if (rainAudio?.gain) {
    rainAudio.baseVolume = 0.014;
    rainAudio.gain.gain.value = rainAudio.enabled ? rainAudio.baseVolume * volume : 0;
  }

  if (nightAudio?.master) {
    nightAudio.master.gain.value = nightAudio.enabled ? volume : 0;
  }

  if (forestAudio?.master) {
    forestAudio.master.gain.value = forestAudio.enabled ? volume : 0;
  }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function fmt(seconds) {
  return (
    String(Math.floor(seconds / 60)).padStart(2, '0') +
    ':' +
    String(seconds % 60).padStart(2, '0')
  );
}

function getIcons() {
  if (data.theme === 'rain') return { sapling: '💧', living: '💧', dead: '☁️' };
  if (data.theme === 'night') return { sapling: '⭐', living: '⭐', dead: '🌑' };
  return { sapling: '🌱', living: '🌲', dead: '🪵' };
}

function setMessage(text) {
  const message = el('message');
  if (message) message.textContent = `“${text}”`;
}

function witherTree() {
  if (!isRunning || phase !== 'focus') return;
  healthyTrees = Math.max(0, healthyTrees - 1);
  data.deadTrees += 1;
  save();
  setMessage('A gust passed through your forest.');
  render();
}

function renderNav() {
  const nav = el('nav');
  if (!nav) return;

  nav.innerHTML = '';
  for (const p of pages) {
    const button = document.createElement('button');
    button.className =
      'px-4 py-2 rounded-2xl border shadow-sm ' +
      (page === p ? 'bg-emerald-500 text-white' : 'bg-white/85');
    button.textContent = labels[p];
    button.onclick = () => {
      page = p;
      render();
    };
    nav.appendChild(button);
  }
}

function renderFocus() {
  const icons = getIcons();

  if (el('phaseLabel')) el('phaseLabel').textContent = phase === 'focus' ? 'Focus Session' : 'Break Time';
  if (el('timer')) el('timer').textContent = fmt(secondsLeft);
  if (el('saplings')) el('saplings').textContent = `${icons.sapling} ${healthyTrees} saplings`;
  if (el('progressLabel')) el('progressLabel').textContent = `${icons.sapling} ${healthyTrees} saplings to protect`;
  if (el('startPauseBtn')) el('startPauseBtn').textContent = isRunning ? 'Pause' : 'Start';

  const controls = el('focusControls');
  if (controls) controls.style.display = !isRunning && phase === 'focus' ? 'flex' : 'none';

  const ring = el('progressRing');
  if (ring) {
    const total = (phase === 'focus' ? data.focusMinutes : data.breakMinutes) * 60;
    const circumference = 376.99;
    ring.style.strokeDashoffset = circumference * (1 - secondsLeft / Math.max(1, total));
  }
}

function getForestLevel() {
  const trees = data.livingTrees;
  if (trees < 10) return '🌱 Sapling Grove';
  if (trees < 25) return '🌿 Young Woodland';
  if (trees < 50) return '🌳 Flourishing Forest';
  if (trees < 100) return '🦉 Ancient Canopy';
  if (trees < 250) return '🍄 Enchanted Wilds';
  return '👑 Mythic Witherwood';
}

function getLocalDateString() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function updateDailyStats(minutes) {
  const today = getLocalDateString();

  if (data.lastFocusDate !== today) {
    if (!data.lastFocusDate) {
      data.streakDays = 1;
    } else {
      const prev = new Date(data.lastFocusDate + 'T00:00:00');
      const curr = new Date(today + 'T00:00:00');
      const diffDays = Math.round((curr - prev) / 86400000);

      if (diffDays === 1) {
        data.streakDays = Math.max(1, data.streakDays + 1);
      } else {
        data.streakDays = 1;
      }
    }

    data.todayFocusMinutes = 0;
    data.lastFocusDate = today;
  }

  data.todayFocusMinutes += minutes;
  data.bestDayMinutes = Math.max(data.bestDayMinutes, data.todayFocusMinutes);
}

function renderForest() {
  const icons = getIcons();

  if (el('forestSummary')) {
    el('forestSummary').textContent = `${data.livingTrees} living trees • ${data.deadTrees} withered trees • ${getForestLevel()}`;
  }

  const grid = el('forestGrid');
  if (!grid) return;

  grid.innerHTML = '';

  for (let i = 0; i < Math.min(120, data.livingTrees); i++) {
    const span = document.createElement('span');
    span.textContent = icons.living;
    grid.appendChild(span);
  }

  for (let i = 0; i < Math.min(30, data.deadTrees); i++) {
    const span = document.createElement('span');
    span.textContent = icons.dead;
    span.className = 'opacity-50';
    grid.appendChild(span);
  }
}

function renderDashboard() {
  const grid = el('dashboardGrid');
  if (!grid) return;

  grid.innerHTML = `
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Forest Level</div>
      <div class="text-2xl font-bold mt-2">${getForestLevel()}</div>
    </div>
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Today's Focus</div>
      <div class="text-3xl font-bold mt-2">${(data.todayFocusMinutes / 60).toFixed(1)}h</div>
    </div>
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Day Streak</div>
      <div class="text-3xl font-bold mt-2">${data.streakDays}</div>
    </div>
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Living Trees</div>
      <div class="text-3xl font-bold mt-2">${data.livingTrees}</div>
    </div>
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Total Withered Trees</div>
      <div class="text-3xl font-bold mt-2">${data.deadTrees}</div>
    </div>
    <div class="rounded-3xl bg-white/85 border shadow-lg p-5">
      <div class="text-sm uppercase">Total Focus</div>
      <div class="text-3xl font-bold mt-2">${(data.totalFocusMinutes / 60).toFixed(1)}h</div>
    </div>
  `;
}

function updateNightSky() {
  const overlay = el('nightOverlay');
  if (!overlay) return;

  if (data.theme !== 'night') {
    overlay.classList.add('hidden');
    overlay.innerHTML = '';
    return;
  }

  overlay.classList.remove('hidden');

  if (overlay.children.length > 0) return;

  const createStar = () => {
    if (data.theme !== 'night') return;

    const star = document.createElement('div');
    star.className = 'shooting-star';
    star.style.left = Math.random() * 70 + '%';
    star.style.top = Math.random() * 35 + '%';
    star.style.transform = 'rotate(25deg)';
    overlay.appendChild(star);

    setTimeout(() => {
      star.remove();
    }, 2500);

    const nextDelay = 8000 + Math.random() * 15000;
    setTimeout(createStar, nextDelay);
  };

  const initialDelay = 3000 + Math.random() * 7000;
  setTimeout(createStar, initialDelay);
}

function updateRain() {
  const overlay = el('rainOverlay');
  if (!overlay) return;

  // Ensure the overlay is attached to <body> so it remains visible even
  // when #appRoot enters fullscreen mode.
  const fullscreenRoot = document.fullscreenElement;
  const desiredParent = fullscreenRoot || document.body;
  if (overlay.parentElement !== desiredParent) {
    desiredParent.appendChild(overlay);
  }

  if (data.theme !== 'rain') {
    overlay.classList.add('hidden');
    overlay.innerHTML = '';
    return;
  }

  if (overlay.children.length === 0) {
    for (let i = 0; i < 140; i++) {
      const drop = document.createElement('div');
      drop.className = 'rain-drop';
      drop.style.left = Math.random() * 100 + '%';
      drop.style.height = 28 + Math.random() * 36 + 'px';
      drop.style.animationDuration = 1.8 + Math.random() * 1.8 + 's';
      drop.style.animationDelay = '-' + Math.random() * 4 + 's';
      drop.style.opacity = 0.22 + Math.random() * 0.24;
      overlay.appendChild(drop);
    }
  }

  overlay.classList.remove('hidden');
}

function updateNightSound() {
  if (data.theme !== 'night' || !data.ambientSoundEnabled) {
    if (nightAudio) nightAudio.pause();
    return;
  }

  if (!nightAudio) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);

    function playChime() {
      if (data.theme !== 'night' || !nightAudio?.enabled) return;

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      const notes = [523.25, 659.25, 783.99, 1046.5];
      osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];
      osc.type = 'sine';

      filter.type = 'lowpass';
      filter.frequency.value = 1800;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.018, now + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 3.5);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(master);

      osc.start(now);
      osc.stop(now + 3.6);

      setTimeout(playChime, 8000 + Math.random() * 18000);
    }

    // Very rare and subtle comet whoosh sound.
    function playCometWhoosh() {
      if (data.theme !== 'night' || !nightAudio?.enabled) return;

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(900, now);
      osc.frequency.exponentialRampToValueAtTime(220, now + 1.8);

      filter.type = 'lowpass';
      filter.frequency.value = 650;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.0009, now + 0.25);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.9);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(master);

      osc.start(now);
      osc.stop(now + 2.0);

      // Exceptionally rare: once every 20–60 minutes.
      setTimeout(playCometWhoosh, 1200000 + Math.random() * 2400000);
    }

    // Very rare distant aurora-like shimmer.
    function playAuroraShimmer() {
      if (data.theme !== 'night' || !nightAudio?.enabled) return;

      const now = ctx.currentTime;
      const notes = [392, 523.25, 659.25, 783.99];

      notes.forEach((freq, i) => {
        const start = now + i * 0.8;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'sine';
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.003, start + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 4.5);

        osc.connect(gain);
        gain.connect(master);

        osc.start(start);
        osc.stop(start + 4.6);
      });

      setTimeout(playAuroraShimmer, 420000 + Math.random() * 480000);
    }

    nightAudio = {
      ctx,
      master,
      enabled: false,
      pause() {
        this.enabled = false;
        this.master.gain.value = 0;
      },
      play() {
        this.enabled = true;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.master.gain.value = getVolumeMultiplier();

        if (!this.started) {
          this.started = true;
          setTimeout(playChime, 3000 + Math.random() * 6000);
          setTimeout(playCometWhoosh, 900000 + Math.random() * 1800000);
          setTimeout(playAuroraShimmer, 240000 + Math.random() * 180000);
        }

        return Promise.resolve();
      }
    };
  }

  if (audioUnlocked) {
    nightAudio.play().catch(() => {});
  }
}

function scheduleRareForestEvent(fn, minDelayMs, maxDelayMs) {
  const run = () => {
    if (data.theme !== 'forest' || !forestAudio?.enabled) {
      setTimeout(run, 60000 + Math.random() * 120000);
      return;
    }

    try {
      fn();
    } catch (e) {
      console.warn('Forest easter egg failed:', e);
    }

    const nextDelay = minDelayMs + Math.random() * (maxDelayMs - minDelayMs);
    setTimeout(run, nextDelay);
  };

  const firstDelay = minDelayMs + Math.random() * (maxDelayMs - minDelayMs);
  setTimeout(run, firstDelay);
}

function updateForestSound() {
  if (data.theme !== 'forest' || !data.ambientSoundEnabled) {
    if (forestAudio) forestAudio.pause();
    return;
  }

  if (!forestAudio) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;

    const ctx = new AudioCtx();
    const master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);

    // --- Rich wind and leaf ambience --- 
    const bufferSize = ctx.sampleRate * 2;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      output[i] = (Math.random() * 2 - 1) * 0.35;
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    noise.loop = true;

    const lowpass = ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 1400;

    const highpass = ctx.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 70;

    const windGain = ctx.createGain();
    windGain.gain.value = 0.018;

    // Slow gust modulation.
    const gustLfo = ctx.createOscillator();
    gustLfo.type = 'sine';
    gustLfo.frequency.value = 0.045;

    const gustDepth = ctx.createGain();
    gustDepth.gain.value = 0.010;

    gustLfo.connect(gustDepth);
    gustDepth.connect(windGain.gain);

    noise.connect(lowpass);
    lowpass.connect(highpass);
    highpass.connect(windGain);
    windGain.connect(master);

    noise.start();
    gustLfo.start();

    function playBirdChirp() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const chirps = 2 + Math.floor(Math.random() * 4);
      const base = 1500 + Math.random() * 1400;

      for (let i = 0; i < chirps; i++) {
        const start = now + i * (0.1 + Math.random() * 0.08);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = Math.random() > 0.5 ? 'sine' : 'triangle';
        osc.frequency.setValueAtTime(base, start);
        osc.frequency.exponentialRampToValueAtTime(base * (1.25 + Math.random() * 0.45), start + 0.05);
        osc.frequency.exponentialRampToValueAtTime(base * 0.82, start + 0.18);

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.012 + Math.random() * 0.01, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);

        osc.connect(gain);
        gain.connect(master);

        osc.start(start);
        osc.stop(start + 0.24);
      }

      // Scheduling is handled by scheduleRareForestEvent().
    }

    function playWoodpecker() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const taps = 4 + Math.floor(Math.random() * 5);

      for (let i = 0; i < taps; i++) {
        const start = now + i * 0.075;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.type = 'square';
        osc.frequency.value = 700;

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.0035, start + 0.003);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.028);

        osc.connect(gain);
        gain.connect(master);

        osc.start(start);
        osc.stop(start + 0.03);
      }

      // Scheduling is handled by scheduleRareForestEvent().
    }

    function playWindChime() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 987.77, 1174.66];
      const hits = 2 + Math.floor(Math.random() * 3);

      for (let i = 0; i < hits; i++) {
        const start = now + i * (0.4 + Math.random() * 0.3);
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();

        osc.type = 'sine';
        osc.frequency.value = notes[Math.floor(Math.random() * notes.length)];

        filter.type = 'lowpass';
        filter.frequency.value = 2200;

        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.006, start + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 3.5);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(master);

        osc.start(start);
        osc.stop(start + 3.6);

      // Scheduling is handled by scheduleRareForestEvent().
    }

    function playFrog() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(220, now);
      osc.frequency.exponentialRampToValueAtTime(180, now + 0.35);

    }

    function playCricket() {

      for (let i = 0; i < chirps; i++) {
        const start = now + i * 0.08;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.frequency.value = 4200 + Math.random() * 1200;

      filter.frequency.value = 1200;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.0025, now + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 5);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(master);

      osc.start(now);
      osc.stop(now + 5.1);

      // Scheduling is handled by scheduleRareForestEvent().
    }

    function playFoxCall() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = 'triangle';
      osc.frequency.setValueAtTime(680, now);
      osc.frequency.exponentialRampToValueAtTime(420, now + 0.8);

      filter.type = 'lowpass';
      filter.frequency.value = 1400;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.002, now + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.1);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(master);

      osc.start(now);
      osc.stop(now + 1.2);

      // Scheduling is handled by scheduleRareForestEvent().
    }

    function playDistantOwl() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      osc.type = 'sine';
      osc.frequency.setValueAtTime(420, now);
      osc.frequency.exponentialRampToValueAtTime(360, now + 0.9);

      filter.type = 'lowpass';
      filter.frequency.value = 900;

      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.006, now + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.4);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(master);

      osc.start(now);
      osc.stop(now + 1.5);

      // Scheduling is handled by scheduleRareForestEvent().
    }

    // Gentle falling leaves ambience: soft rustles drifting through the canopy.
    function playLeafRustle() {
      if (data.theme !== 'forest' || !forestAudio?.enabled) return;

      const now = ctx.currentTime;
      const rustles = 3 + Math.floor(Math.random() * 4);

      for (let i = 0; i < rustles; i++) {
        const start = now + i * (0.25 + Math.random() * 0.35);

        const buffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.7), ctx.sampleRate);
        const channel = buffer.getChannelData(0);
        for (let j = 0; j < channel.length; j++) {
          // Short burst of filtered noise with natural decay.
          channel[j] = (Math.random() * 2 - 1) * Math.exp(-j / (ctx.sampleRate * 0.18)) * 0.18;
        }

        const source = ctx.createBufferSource();
        source.buffer = buffer;

        const bandpass = ctx.createBiquadFilter();
        bandpass.type = 'bandpass';
        bandpass.frequency.value = 1200 + Math.random() * 1400;
        bandpass.Q.value = 0.7;

        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(0.0018 + Math.random() * 0.0012, start + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.8);

        source.connect(bandpass);
        bandpass.connect(gain);
        gain.connect(master);

        source.start(start);
        source.stop(start + 0.9);
      }
    }

    // Additional natural forest easter eggs (variants of existing generators)
    const playRobinSong = playBirdChirp;
    const playCuckooCall = playBirdChirp;
    const playFallingLeaves = playLeafRustle;
    const playDistantBrook = playStream;
    const playTreeCreak = playWoodpecker;
    const playForestBreeze = playWindChime;
    const playBullfrog = playFrog;
    const playKatydid = playCricket;
    const playHootEcho = playDistantOwl;
    const playRustlingBranches = playWindChime;

    forestAudio = {
      ctx,
      master,
      enabled: false,
      pause() {
        this.enabled = false;
        this.master.gain.value = 0;
      },
      play() {
        this.enabled = true;
        if (this.ctx.state === 'suspended') this.ctx.resume();
        this.master.gain.value = getVolumeMultiplier();

        if (!this.started) {
          this.started = true;

          // Common ambient wildlife (still infrequent).
          scheduleRareForestEvent(playBirdChirp, 180000, 600000);        // 3–10 min
          scheduleRareForestEvent(playLeafRustle, 90000, 240000);        // 1.5–4 min
          scheduleRareForestEvent(playWoodpecker, 120000, 360000);       // 2–6 min
          scheduleRareForestEvent(playWindChime, 180000, 480000);        // 3–8 min
          scheduleRareForestEvent(playDistantOwl, 240000, 720000);       // 4–12 min
          scheduleRareForestEvent(playFrog, 300000, 900000);             // 5–15 min
          scheduleRareForestEvent(playCricket, 360000, 1080000);         // 6–18 min
          scheduleRareForestEvent(playStream, 480000, 1440000);          // 8–24 min
          scheduleRareForestEvent(playFoxCall, 720000, 2160000);         // 12–36 min

          // 10 extra easter eggs — intentionally rare discoveries.
          scheduleRareForestEvent(playRobinSong, 600000, 1800000);       // 10–30 min
          scheduleRareForestEvent(playCuckooCall, 720000, 2400000);      // 12–40 min
          scheduleRareForestEvent(playFallingLeaves, 840000, 2700000);   // 14–45 min
          scheduleRareForestEvent(playDistantBrook, 960000, 3000000);    // 16–50 min
          scheduleRareForestEvent(playTreeCreak, 1080000, 3300000);      // 18–55 min
          scheduleRareForestEvent(playForestBreeze, 1200000, 3600000);   // 20–60 min
          scheduleRareForestEvent(playBullfrog, 1320000, 3900000);       // 22–65 min
          scheduleRareForestEvent(playKatydid, 1440000, 4200000);        // 24–70 min
          scheduleRareForestEvent(playHootEcho, 1560000, 4500000);       // 26–75 min
          scheduleRareForestEvent(playRustlingBranches, 1680000, 4800000); // 28–80 min
        }

        return Promise.resolve();
      }
    };
  }

  if (audioUnlocked) {
    forestAudio.play().catch(() => {});
  }
}

function updateRainSound() {
  if (data.theme !== 'rain' || !data.ambientSoundEnabled) {
    if (rainAudio) {
      rainAudio.pause();
      rainAudio.currentTime = 0;
    }
    return;
  }

  if (!rainAudio) {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    if (!AudioCtx) return;

    const ctx = new AudioCtx();

    // Gentle pink-noise drizzle.
    const bufferSize = ctx.sampleRate * 6;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const output = buffer.getChannelData(0);

    let b0 = 0, b1 = 0, b2 = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      b0 = 0.99765 * b0 + white * 0.0990460;
      b1 = 0.96300 * b1 + white * 0.2965164;
      b2 = 0.57000 * b2 + white * 1.0526913;

      let sample = (b0 + b1 + b2 + white * 0.1848) * 0.03;
      if (Math.random() < 0.0012) {
        sample += (Math.random() * 2 - 1) * 0.06;
      }
      output[i] = sample;
    }

    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    const highpass = ctx.createBiquadFilter();
    highpass.type = 'highpass';
    highpass.frequency.value = 180;

    const lowpass = ctx.createBiquadFilter();
    lowpass.type = 'lowpass';
    lowpass.frequency.value = 2400;

    const gain = ctx.createGain();
    gain.gain.value = 0;

    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.02;

    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 0.0015;

    lfo.connect(lfoGain);
    lfoGain.connect(gain.gain);

    source.connect(highpass);
    highpass.connect(lowpass);
    lowpass.connect(gain);
    gain.connect(ctx.destination);

    source.start();
    lfo.start();

    // Rare lightning rumble.
    function playLightning() {
      if (data.theme !== 'rain' || !rainAudio?.enabled) return;

      const now = ctx.currentTime;
      const noiseBuffer = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
      const out = noiseBuffer.getChannelData(0);
      for (let i = 0; i < out.length; i++) {
        out[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 1.8));
      }

      const thunder = ctx.createBufferSource();
      thunder.buffer = noiseBuffer;

      const thunderFilter = ctx.createBiquadFilter();
      thunderFilter.type = 'lowpass';
      thunderFilter.frequency.value = 180;

      const thunderGain = ctx.createGain();
      thunderGain.gain.setValueAtTime(0.0001, now);
      thunderGain.gain.exponentialRampToValueAtTime(0.015, now + 0.05);
      thunderGain.gain.exponentialRampToValueAtTime(0.0001, now + 3.0);

      thunder.connect(thunderFilter);
      thunderFilter.connect(thunderGain);
      thunderGain.connect(gain);

      thunder.start(now);
      thunder.stop(now + 3.1);

      setTimeout(playLightning, 180000 + Math.random() * 360000);
    }

    // Very rare cloudburst swell.
    function playCloudburst() {
      if (data.theme !== 'rain' || !rainAudio?.enabled) return;

      const now = ctx.currentTime;
      const original = rainAudio.baseVolume;
      const boosted = original * 2.4;

      gain.gain.cancelScheduledValues(now);
      gain.gain.setTargetAtTime(boosted * getVolumeMultiplier(), now, 1.2);
      gain.gain.setTargetAtTime(original * getVolumeMultiplier(), now + 18, 4.5);

      setTimeout(playCloudburst, 420000 + Math.random() * 600000);
    }

    rainAudio = {
      ctx,
      gain,
      enabled: false,
      baseVolume: 0.12,
      pause() {
        this.enabled = false;
        this.gain.gain.setTargetAtTime(0, this.ctx.currentTime, 1.4);
      },
      play() {
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
        this.enabled = true;
        this.gain.gain.setTargetAtTime(
          this.baseVolume * getVolumeMultiplier(),
          this.ctx.currentTime,
          1.8
        );

        if (!this.started) {
          this.started = true;
          setTimeout(playLightning, 90000 + Math.random() * 180000);
          setTimeout(playCloudburst, 240000 + Math.random() * 300000);
        }

        return Promise.resolve();
      },
      set currentTime(_) {}
    };
  }

  if (audioUnlocked) {
    rainAudio.play().catch(() => {});
  }
}

  document.body.className =
    'min-h-screen bg-gradient-to-b ' +
    gradient.join(' ') +
    ' ' +
    (isNight ? 'text-slate-100' : 'text-slate-800');

    gradient.join(' ') +

        : 'px-5 py-3 rounded-2xl border bg-white hover:bg-emerald-50 transition';
  }

  const focusLabel = document.querySelector('#focusControls label');
  if (focusLabel) {
    focusLabel.className = isNight
      ? 'text-slate-300 font-medium'
      : data.theme === 'rain'
        ? 'text-slate-600 font-medium'
        : 'text-slate-600 font-medium';
  }

  const focusInput = el('focusMinutesInput');
  if (focusInput) {
    focusInput.className = isNight
      ? 'w-24 rounded-xl border border-indigo-300/20 bg-slate-900/70 text-slate-100 text-center px-3 py-2 shadow-inner focus:outline-none focus:ring-2 focus:ring-violet-400/50'
      : data.theme === 'rain'
        ? 'w-24 rounded-xl border border-sky-200 bg-white/90 text-slate-800 text-center px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-300/50'
        : 'w-24 rounded-xl border border-emerald-200 bg-white text-slate-800 text-center px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-300/50';
  }

  const breakInput = el('breakMinutesInput');
  if (breakInput) {
    breakInput.className = isNight
      ? 'w-full mt-2 rounded-xl border border-indigo-300/20 bg-slate-900/70 text-slate-100 px-3 py-2 shadow-inner focus:outline-none focus:ring-2 focus:ring-violet-400/50'
      : data.theme === 'rain'
        ? 'w-full mt-2 rounded-xl border border-sky-200 bg-white/90 text-slate-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-300/50'
        : 'w-full mt-2 rounded-xl border border-emerald-200 bg-white text-slate-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-300/50';
  }

  const themeSelect = el('themeSelect');
  if (themeSelect) {
    themeSelect.className = isNight
      ? 'w-full mt-2 rounded-xl border border-indigo-300/20 bg-slate-900/70 text-slate-100 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-400/50'
      : data.theme === 'rain'
        ? 'w-full mt-2 rounded-xl border border-sky-200 bg-white/90 text-slate-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sky-300/50'
        : 'w-full mt-2 rounded-xl border border-emerald-200 bg-white text-slate-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-300/50';
  }

  updateRain();
  updateNightSky();
  updateForestSound();
  updateNightSound();
  updateRainSound();
  applyAudioVolumes();
}

function render() {
  renderNav();
  renderFocus();
  renderForest();
  renderDashboard();

  for (const p of pages) {
    const section = el(p + 'Page');
    if (section) section.classList.toggle('hidden', page !== p);
  }

  if (el('focusMinutesInput')) el('focusMinutesInput').value = data.focusMinutes;
  if (el('breakMinutesInput')) el('breakMinutesInput').value = data.breakMinutes;
  if (el('breaksEnabledToggle')) el('breaksEnabledToggle').checked = data.breaksEnabled;
  if (el('themeSelect')) el('themeSelect').value = data.theme;
  if (el('ambientSoundToggle')) el('ambientSoundToggle').checked = data.ambientSoundEnabled;
  if (el('ambientVolumeInput')) el('ambientVolumeInput').value = data.ambientVolume ?? 50;
  if (el('ambientVolumeLabel')) {
    const percent = data.ambientVolume ?? 50;
    el('ambientVolumeLabel').textContent = `${percent}%`;
  } 
  if (el('fullscreenBtn')) {
    el('fullscreenBtn').textContent = '⛶';
    el('fullscreenBtn').title = document.fullscreenElement ? 'Exit Fullscreen' : 'Enter Fullscreen';
    el('fullscreenBtn').setAttribute('aria-label', document.fullscreenElement ? 'Exit Fullscreen' : 'Enter Fullscreen');
  }

  applyTheme();
}

function startTimer() {
  if (isRunning) return;

  isRunning = true;
  const endTimestamp = Date.now() + secondsLeft * 1000;

  intervalId = setInterval(() => {
    secondsLeft = Math.max(0, Math.round((endTimestamp - Date.now()) / 1000));

    if (secondsLeft <= 0) {
      clearInterval(intervalId);
      intervalId = null;
      isRunning = false;

      if (phase === 'focus') {
        data.livingTrees += healthyTrees;
        data.totalFocusMinutes += data.focusMinutes;
        updateDailyStats(data.focusMinutes);
        save(); 

        if (data.breaksEnabled) {
          phase = 'break';
          secondsLeft = data.breakMinutes * 60;
          setMessage('Your forest grew peacefully today.');
        } else {
          phase = 'focus';
          healthyTrees = Math.max(1, Math.ceil(data.focusMinutes / 10));
          secondsLeft = data.focusMinutes * 60;
          setMessage('New saplings are ready to grow.');
        }
      } else {
        phase = 'focus';
        healthyTrees = Math.max(1, Math.ceil(data.focusMinutes / 10));
        secondsLeft = data.focusMinutes * 60;
        setMessage('New saplings are ready to grow.');
      }
    }

    render(); 
  }, 250);

  render();
}

function pauseTimer() {
  isRunning = false;
  clearInterval(intervalId);
  render();
}

function resetAllData() {
  if (!confirm('Reset ALL saved data? This will permanently remove your forest and all statistics.')) return;

  const theme = data.theme;
  const ambientSoundEnabled = data.ambientSoundEnabled;
  const ambientVolume = data.ambientVolume;
  const focusMinutes = data.focusMinutes;
  const breakMinutes = data.breakMinutes;
  const breaksEnabled = data.breaksEnabled;

  data = {
    ...DEFAULTS,
    theme,
    ambientSoundEnabled,
    ambientVolume,
    focusMinutes,
    breakMinutes,
    breaksEnabled,
  };

  save(); 
  resetTimer();
  page = 'focus';
  setMessage('A new forest begins.');
  render();
}

function resetTimer() {
  pauseTimer();
  phase = 'focus';
  healthyTrees = Math.max(1, Math.ceil(data.focusMinutes / 10));
  secondsLeft = data.focusMinutes * 60;
  setMessage('A calm mind nurtures strong roots.');
  render();
}

function bindEvents() {
  el('startPauseBtn')?.addEventListener('click', () => {
    isRunning ? pauseTimer() : startTimer();
  });

  el('witherBtn')?.addEventListener('click', witherTree);
  el('resetBtn')?.addEventListener('click', resetTimer);
    el('resetAllBtn')?.addEventListener('click', resetAllData);

  el('focusMinutesInput')?.addEventListener('input', (e) => {
    const value = e.target.value.trim();

    // Allow the field to be temporarily empty while editing.
    if (value === '') {
      return;
    }

    const parsed = Number(value);
    if (!Number.isFinite(parsed)) {
      return;
    }

    data.focusMinutes = Math.max(1, Math.min(180, parsed));
    healthyTrees = Math.max(1, Math.ceil(data.focusMinutes / 10));

    if (!isRunning && phase === 'focus') {
      secondsLeft = data.focusMinutes * 60;
    }

    save();
    render();
  });

  el('focusMinutesInput')?.addEventListener('blur', (e) => {
    if (e.target.value.trim() === '') {
      e.target.value = data.focusMinutes;
    }
  });

  el('breakMinutesInput')?.addEventListener('input', (e) => {
    const value = e.target.value.trim();

    // Allow the field to be temporarily empty while editing.
    if (value === '') {
      return;
    }

    const parsed = Number(value);
    if (!Number.isFinite(parsed)) {
      return;
    }

    data.breakMinutes = Math.max(1, Math.min(60, parsed));

    save();
    render();
  });

  el('breakMinutesInput')?.addEventListener('blur', (e) => {
    if (e.target.value.trim() === '') {
      e.target.value = data.breakMinutes;
    }
  });

  el('breaksEnabledToggle')?.addEventListener('change', (e) => {
    data.breaksEnabled = e.target.checked;
    save();
    render();
  });

  el('themeSelect')?.addEventListener('change', (e) => {
    data.theme = e.target.value;
    save();
    render();
  });

  el('ambientSoundToggle')?.addEventListener('change', (e) => {
    data.ambientSoundEnabled = e.target.checked;
    save();
    render();
  });

  el('ambientVolumeInput')?.addEventListener('input', (e) => {
    data.ambientVolume = Math.max(0, Math.min(100, Number(e.target.value) || 0));
    save();
    applyAudioVolumes();
    render();
  });

  el('fullscreenBtn')?.addEventListener('click', async () => {
    const root = el('appRoot');
    if (!root) return;

    if (!document.fullscreenElement) {
      await root.requestFullscreen().catch(() => {});
    } else {
      await document.exitFullscreen().catch(() => {});
    }

    render();
  });

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && isRunning && phase === 'focus') {
      e.preventDefault();
      witherTree();
    }
  });

  document.addEventListener('click', () => {
    // Unlock browser audio after the first user interaction.
    // This enables both the rain ambience and the night-theme chimes,
    // even when the HTML file is opened directly from disk.
    audioUnlocked = true;
    updateForestSound();
    updateRainSound();
    updateNightSound();
  });

  document.addEventListener('fullscreenchange', render);
}

bindEvents();
render();
</script>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js');
  });
}
</script>
</body>
</html>
